<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a73e8" />
  <meta name="description" content="Mini Cup — le mini-jeu football" />
  <title>Mini Cup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="screen">
    <div class="glow glow-a" aria-hidden="true"></div>
    <div class="glow glow-b" aria-hidden="true"></div>
    <div class="pitch" aria-hidden="true"></div>

    <header class="brand">
      <div class="logo" aria-hidden="true">
        <span class="ball"></span>
      </div>
      <h1>Mini Cup</h1>
      <p>Prêt pour le match&nbsp;?</p>
    </header>

    <button type="button" class="start" id="startBtn">
      <span>Démarrer</span>
    </button>
  </main>

  <script src="app.js"></script>
</body>
</html>
