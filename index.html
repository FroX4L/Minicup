<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a73e8" />
  <meta name="description" content="Mini Cup — le mini-jeu football" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="ball.png" />
  <title>Mini Cup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=104" />
</head>
<body>
  <main class="screen" id="menu">
    <img class="menu-bg" src="bg.png" alt="" draggable="false" />

    <button type="button" class="sound-btn" id="soundBtnMenu" aria-label="Son" aria-pressed="true">
      <span class="sound-btn__on" aria-hidden="true">🔊</span>
      <span class="sound-btn__off" aria-hidden="true" hidden>🔇</span>
    </button>

    <header class="brand">
      <div class="logo" aria-hidden="true">
        <img class="logo-ball" src="ball.png" alt="" draggable="false" />
      </div>
      <h1>Mini Cup</h1>
    </header>

    <div class="menu-actions">
      <button type="button" class="start" id="startBtn">
        <span>Démarrer</span>
      </button>
      <button type="button" class="start start--alt" id="minigamesBtn">
        <span>Mini-jeux</span>
      </button>
      <button type="button" class="start start--alt" id="teamPickBtn">
        <span>Choix équipe</span>
      </button>
    </div>

    <section class="diff-panel" id="diffPanel" hidden aria-label="Difficulté">
      <h2 class="diff-panel__title">Difficulté</h2>
      <p class="diff-panel__value" id="diffSliderLabel">Normale</p>
      <div class="diff-slider-wrap">
        <input
          type="range"
          class="diff-slider"
          id="diffSlider"
          min="0"
          max="2"
          step="1"
          value="1"
          aria-valuemin="0"
          aria-valuemax="2"
          aria-valuenow="1"
          aria-label="Difficulté"
        />
        <div class="diff-slider__ticks" aria-hidden="true">
          <span>Facile</span>
          <span>Normale</span>
          <span>Difficile</span>
        </div>
      </div>
      <button type="button" class="start" id="diffPlayBtn">
        <span>Jouer</span>
      </button>
    </section>

    <section class="minigames-panel" id="minigamesPanel" hidden aria-label="Mini-jeux">
      <h2 class="minigames-panel__title">Mini-jeux</h2>
      <div class="minigames-list" role="list">
        <button type="button" class="minigame-card" id="minigameTimeTrial" role="listitem" disabled aria-disabled="true">
          <span class="minigame-card__name">Course contre la montre</span>
          <span class="minigame-card__badge">Bientôt</span>
        </button>
      </div>
    </section>

    <section class="teams" id="teamsPanel" hidden aria-label="Choix d'équipe">
      <h2 class="teams-title">Équipe & scores</h2>
      <div class="team-grid" id="teamGrid" role="listbox" aria-label="Équipes">
        <button type="button" class="team is-selected" role="option" aria-selected="true" data-team="fr" aria-label="France">
          <span class="flag flag--fr" aria-hidden="true"></span>
          <span class="team__score" data-team-score="fr">0</span>
        </button>
        <button type="button" class="team" role="option" aria-selected="false" data-team="ma" aria-label="Maroc">
          <span class="flag flag--ma" aria-hidden="true"></span>
          <span class="team__score" data-team-score="ma">0</span>
        </button>
        <button type="button" class="team" role="option" aria-selected="false" data-team="es" aria-label="Espagne">
          <span class="flag flag--es" aria-hidden="true"></span>
          <span class="team__score" data-team-score="es">0</span>
        </button>
        <button type="button" class="team" role="option" aria-selected="false" data-team="ar" aria-label="Argentine">
          <span class="flag flag--ar" aria-hidden="true"></span>
          <span class="team__score" data-team-score="ar">0</span>
        </button>
        <button type="button" class="team" role="option" aria-selected="false" data-team="dz" aria-label="Algérie">
          <span class="flag flag--dz" aria-hidden="true"></span>
          <span class="team__score" data-team-score="dz">0</span>
        </button>
        <button type="button" class="team" role="option" aria-selected="false" data-team="it" aria-label="Italie">
          <span class="flag flag--it" aria-hidden="true"></span>
          <span class="team__score" data-team-score="it">0</span>
        </button>
        <button type="button" class="team" role="option" aria-selected="false" data-team="us" aria-label="USA">
          <span class="flag flag--us" aria-hidden="true"></span>
          <span class="team__score" data-team-score="us">0</span>
        </button>
        <button type="button" class="team" role="option" aria-selected="false" data-team="en" aria-label="Angleterre">
          <span class="flag flag--en" aria-hidden="true"></span>
          <span class="team__score" data-team-score="en">0</span>
        </button>
        <button type="button" class="team" role="option" aria-selected="false" data-team="no" aria-label="Norvège">
          <span class="flag flag--no" aria-hidden="true"></span>
          <span class="team__score" data-team-score="no">0</span>
        </button>
      </div>
    </section>
  </main>

  <section class="game" id="game" hidden>
    <div class="hud" id="hud">
      <div class="hud-lives" id="livesEl" aria-label="Ballons restants">
        <img class="hud-ball is-on" data-life="0" src="ball.png" alt="" draggable="false" />
        <img class="hud-ball is-on" data-life="1" src="ball.png" alt="" draggable="false" />
        <img class="hud-ball is-on" data-life="2" src="ball.png" alt="" draggable="false" />
      </div>
    </div>
    <div class="game-top-actions">
      <button type="button" class="sound-btn sound-btn--game" id="soundBtnGame" aria-label="Son" aria-pressed="true">
        <span class="sound-btn__on" aria-hidden="true">🔊</span>
        <span class="sound-btn__off" aria-hidden="true" hidden>🔇</span>
      </button>
      <button type="button" class="quit-x" id="quitBtn" aria-label="Quitter">
        <span aria-hidden="true">✕</span>
      </button>
    </div>
    <div class="hud-score" aria-label="Score"><span id="scoreVal">0</span></div>
    <div class="score-recap" id="scoreRecap" hidden aria-hidden="true">0</div>
    <div class="hud-team" id="hudTeam" aria-label="Équipe">
      <span class="flag flag--fr" id="hudTeamFlag" aria-hidden="true"></span>
    </div>

    <img class="game-bg" src="bg.png" alt="" draggable="false" />
    <img class="game-bg hitbox-bg" id="hitboxBg" src="hitbox_bg.png" alt="" draggable="false" />

    <div class="tribunes" aria-hidden="true">
      <img class="tribune tribune-02" src="tribune_02.png" alt="" draggable="false" />
      <div class="pions" id="pionsEl"></div>
      <img class="tribune tribune-01" src="tribune_01.png" alt="" draggable="false" />
    </div>

    <div class="goal-area" id="goalArea">
      <div class="cage-wrap">
        <img class="cage" id="cage" src="cage.png" alt="" draggable="false" />
        <div class="goal-marker" id="goalMarker" hidden></div>
        <div class="keeper" id="keeper" aria-hidden="true">
          <img class="keeper__body" id="keeperBody" src="Gardien_walk_bas1.png" alt="" draggable="false" />
          <img class="keeper__head" id="keeperHead" src="Gardien_head_idle.png" alt="" draggable="false" />
        </div>
        <img class="cage hitbox-cage" id="hitboxCage" src="hitbox_cage.png" alt="" draggable="false" />
      </div>
    </div>

    <div class="fb-ball" id="ball" aria-hidden="true">
      <div class="fb-ball__sphere">
        <div class="fb-ball__mesh" id="ballPattern">
          <svg class="fb-ball__svg" viewBox="0 0 240 208" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect width="240" height="208" fill="#ffffff"/>
            <g fill="#0f1a5c">
              <!-- rangée 0 — hex plus petits -->
              <polygon points="26,10 38,17 38,31 26,38 14,31 14,17"/>
              <polygon points="72,10 84,17 84,31 72,38 60,31 60,17"/>
              <polygon points="118,10 130,17 130,31 118,38 106,31 106,17"/>
              <polygon points="164,10 176,17 176,31 164,38 152,31 152,17"/>
              <polygon points="210,10 222,17 222,31 210,38 198,31 198,17"/>
              <!-- rangée 1 -->
              <polygon points="49,40 61,47 61,61 49,68 37,61 37,47"/>
              <polygon points="95,40 107,47 107,61 95,68 83,61 83,47"/>
              <polygon points="141,40 153,47 153,61 141,68 129,61 129,47"/>
              <polygon points="187,40 199,47 199,61 187,68 175,61 175,47"/>
              <!-- rangée 2 -->
              <polygon points="26,70 38,77 38,91 26,98 14,91 14,77"/>
              <polygon points="72,70 84,77 84,91 72,98 60,91 60,77"/>
              <polygon points="118,70 130,77 130,91 118,98 106,91 106,77"/>
              <polygon points="164,70 176,77 176,91 164,98 152,91 152,77"/>
              <polygon points="210,70 222,77 222,91 210,98 198,91 198,77"/>
              <!-- rangée 3 -->
              <polygon points="49,100 61,107 61,121 49,128 37,121 37,107"/>
              <polygon points="95,100 107,107 107,121 95,128 83,121 83,107"/>
              <polygon points="141,100 153,107 153,121 141,128 129,121 129,107"/>
              <polygon points="187,100 199,107 199,121 187,128 175,121 175,107"/>
              <!-- rangée 4 -->
              <polygon points="26,130 38,137 38,151 26,158 14,151 14,137"/>
              <polygon points="72,130 84,137 84,151 72,158 60,151 60,137"/>
              <polygon points="118,130 130,137 130,151 118,158 106,151 106,137"/>
              <polygon points="164,130 176,137 176,151 164,158 152,151 152,137"/>
              <polygon points="210,130 222,137 222,151 210,158 198,151 198,137"/>
              <!-- rangée 5 -->
              <polygon points="49,160 61,167 61,181 49,188 37,181 37,167"/>
              <polygon points="95,160 107,167 107,181 95,188 83,181 83,167"/>
              <polygon points="141,160 153,167 153,181 141,188 129,181 129,167"/>
              <polygon points="187,160 199,167 199,181 187,188 175,181 175,167"/>
            </g>
          </svg>
        </div>
      </div>
    </div>

    <div class="fb-ball fb-ball--ghost" id="ballGhost" hidden aria-hidden="true">
      <div class="fb-ball__sphere">
        <div class="fb-ball__mesh" id="ghostPattern">
          <svg class="fb-ball__svg" viewBox="0 0 240 208" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect width="240" height="208" fill="#ffffff"/>
            <g fill="#0f1a5c">
              <polygon points="26,10 38,17 38,31 26,38 14,31 14,17"/>
              <polygon points="72,10 84,17 84,31 72,38 60,31 60,17"/>
              <polygon points="118,10 130,17 130,31 118,38 106,31 106,17"/>
              <polygon points="164,10 176,17 176,31 164,38 152,31 152,17"/>
              <polygon points="210,10 222,17 222,31 210,38 198,31 198,17"/>
              <polygon points="49,40 61,47 61,61 49,68 37,61 37,47"/>
              <polygon points="95,40 107,47 107,61 95,68 83,61 83,47"/>
              <polygon points="141,40 153,47 153,61 141,68 129,61 129,47"/>
              <polygon points="187,40 199,47 199,61 187,68 175,61 175,47"/>
              <polygon points="26,70 38,77 38,91 26,98 14,91 14,77"/>
              <polygon points="72,70 84,77 84,91 72,98 60,91 60,77"/>
              <polygon points="118,70 130,77 130,91 118,98 106,91 106,77"/>
              <polygon points="164,70 176,77 176,91 164,98 152,91 152,77"/>
              <polygon points="210,70 222,77 222,91 210,98 198,91 198,77"/>
              <polygon points="49,100 61,107 61,121 49,128 37,121 37,107"/>
              <polygon points="95,100 107,107 107,121 95,128 83,121 83,107"/>
              <polygon points="141,100 153,107 153,121 141,128 129,121 129,107"/>
              <polygon points="187,100 199,107 199,121 187,128 175,121 175,107"/>
              <polygon points="26,130 38,137 38,151 26,158 14,151 14,137"/>
              <polygon points="72,130 84,137 84,151 72,158 60,151 60,137"/>
              <polygon points="118,130 130,137 130,151 118,158 106,151 106,137"/>
              <polygon points="164,130 176,137 176,151 164,158 152,151 152,137"/>
              <polygon points="210,130 222,137 222,151 210,158 198,151 198,137"/>
              <polygon points="49,160 61,167 61,181 49,188 37,181 37,167"/>
              <polygon points="95,160 107,167 107,181 95,188 83,181 83,167"/>
              <polygon points="141,160 153,167 153,181 141,188 129,181 129,167"/>
              <polygon points="187,160 199,167 199,181 187,188 175,181 175,167"/>
            </g>
          </svg>
        </div>
      </div>
    </div>
    <div class="lose" id="loseScreen" hidden>
      <p class="lose-score" id="loseScoreVal" aria-label="Score">0</p>
      <button type="button" class="start" id="replayBtn">
        <span>Rejouer</span>
      </button>
    </div>
  </section>

  <script src="app.js?v=126"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
      // Après un push : bascule propre sur le nouveau SW (1 reload max)
      if (navigator.serviceWorker.controller) {
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          window.location.reload();
        });
      }
    }
  </script>
  <!-- Logique jeu / hitbox : app.js (pas dans ce fichier HTML) -->
</body>
</html>
