  <meta name="theme-color" content="#1a73e8" />
  <meta name="description" content="Mini Cup — le mini-jeu football" />
  <title>Mini Cup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

<body>
  <main class="screen" id="menu">
    <div class="glow glow-a" aria-hidden="true"></div>
    <div class="glow glow-b" aria-hidden="true"></div>
    <div class="pitch" aria-hidden="true"></div>

    <header class="brand">
      <div class="logo" aria-hidden="true">
        <span class="logo-ball"></span>
      </div>
      <h1>Mini Cup</h1>
      <p>Prêt pour le match&nbsp;?</p>
    </header>

    <button type="button" class="start" id="startBtn">
      <span>Démarrer</span>
    </button>
  </main>

  <section class="game" id="game" hidden>
    <img class="game-bg" src="bg.png" alt="" draggable="false" />
    <img class="game-bg hitbox-bg" id="hitboxBg" src="hitbox_bg.png" alt="" draggable="false" />

    <div class="goal-area" id="goalArea">
      <div class="cage-wrap">
        <img class="cage" id="cage" src="cage.png" alt="" draggable="false" />
        <img class="keeper" id="keeper" src="Gardien_walk1.png" alt="" draggable="false" />
        <img class="cage hitbox-cage" id="hitboxCage" src="hitbox_cage.png" alt="" draggable="false" />
      </div>
    </div>

    <div class="goal-marker" id="goalMarker" hidden></div>
